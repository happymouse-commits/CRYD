server:
  port: 8080

spring:
  application:
    name: CRYD

  # ===== 数据库配置（开发阶段用H2，正式换MySQL） =====
  datasource:
    url: jdbc:h2:file:./data/cryd;AUTO_SERVER=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password:
    # MySQL配置（正式环境切换）
    # url: jdbc:mysql://localhost:3306/cryd?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai
    # driver-class-name: com.mysql.cj.jdbc.Driver
    # username: root
    # password: your_password

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  # Redis配置
  data:
    redis:
      host: localhost
      port: 6379

# ===== 讯飞星火大模型配置 =====
