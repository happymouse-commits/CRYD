server:
  port: 8080

spring:
  application:
    name: CRYD
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration
      - org.springframework.boot.autoconfigure.data.redis.RedisRepositoriesAutoConfiguration

  # ===== 数据库配置 — openGauss 6.0 =====
  datasource:
    # H2 开发数据库（已切换 openGauss）
    # url: jdbc:h2:file:f:/从容应对/后端/data/cryd;AUTO_SERVER=TRUE
    # driver-class-name: org.h2.Driver
    # username: sa
    # password:
    # openGauss 6.0 配置
    url: jdbc:postgresql://localhost:5432/sghr?ssl=false
    driver-class-name: org.postgresql.Driver
    username: sghr_admin
    password: Sghr@2026
    # MySQL配置（正式环境切换）
    # url: jdbc:mysql://localhost:3306/cryd?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai
    # driver-class-name: com.mysql.cj.jdbc.Driver
    # username: root
    # password: your_password

  # H2 控制台
  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    database-platform: com.happymouse.cryd.config.OpenGaussDialect
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  # Redis配置
  data:
    redis:
      host: localhost
      port: 6379

# ===== 大模型配置（通过环境变量注入，参考 .env.example）=====
# DeepSeek V4 Pro — OpenAI 兼容接口
llm:
  api:
    url: ${LLM_API_URL:https://api.deepseek.com/v1/chat/completions}
    key: sk-37eab57deb084a09b4a3d8bb44fe7c6c
    model: ${LLM_API_MODEL:deepseek-chat}

# ===== 多智能体配置 =====
agent:
  # 管道配置
  pipeline:
    max-retries: 3
    task-timeout-ms: 120000
    review-enabled: true
    review-threshold: 0.6

  # 画像分析师
  profile-analyst:
    name: 画像分析师
    description: 通过对话分析学生学习画像，提取6个维度特征
  # 知识库管理员
  knowledge-manager:
    name: 知识库管理员
    description: 管理课程知识库，提供知识点检索服务
  # 课程设计师
  course-designer:
    name: 课程设计师
    description: 根据学生画像生成个性化讲解文档和思维导图
  # 出题专家
  question-expert:
    name: 出题专家
    description: 根据知识点和学生水平生成不同难度的练习题
  # 路径规划师
  path-planner:
    name: 路径规划师
    description: 根据画像和进度规划个性化学习路径
  # 辅导老师
  tutor:
    name: 辅导老师
    description: 即时答疑解惑，提供多模态辅导

# ===== RAG知识库配置 =====
rag:
  enabled: true
  chunk-size: 512
  chunk-overlap: 64
  top-k: 5
  similarity-threshold: 0.65
  vector-store: in-memory  # in-memory / redis / milvus

  # 嵌入模型配置（本地 n-gram 哈希，无需外部 API）
  embedding:
    dimension: 1024  # 本地哈希向量维度

    # 讯飞星火嵌入（未来替换时填写）
    spark:
      url: https://emb.xf-yun.com/v1/embeddings
      key: YOUR_SPARK_EMBEDDING_KEY  # TODO: 填写星火嵌入API Key
      model: embedding-v1  # 2560维

  # 防幻觉四道门配置
  hallucination:
    enabled: true
    fact-check-enabled: true  # 第三道门：事实校验
    max-retries: 2  # 校验失败最多重试次数

  # 知识库导入（C语言谭浩强）
  knowledge-import:
    enabled: true
    base-path: ${KNOWLEDGE_BASE_PATH:./data/knowledge-base}

# ===== 系统功能配置 =====
system:
  resource:
    max-batch-generation: 10
    max-generation-per-day: 50
  evaluation:
    max-questions-per-test: 20
    default-time-minutes: 45
  learning-path:
    max-steps: 10
    suggest-daily: true
