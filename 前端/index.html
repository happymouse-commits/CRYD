<!DOCTYPE html>
<html lang="zh">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>从容应队的网站</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="page-shell">
      <section class="hero-panel">
        <div class="hero-header">
          <div class="brand-badge">✨</div>
          <span class="brand-name">从容应队</span>
        </div>

        <div class="hero-illustration" id="heroIllustration">
          <div class="char purple" id="purpleChar">
            <div class="eye-row" id="purpleEyes"></div>
            <div class="mouth"></div>
          </div>
          <div class="char black" id="blackChar">
            <div class="eye-row" id="blackEyes"></div>
            <div class="mouth"></div>
          </div>
          <div class="char orange" id="orangeChar">
            <div class="pupil-row" id="orangePupils"></div>
            <div class="mouth"></div>
          </div>
          <div class="char yellow" id="yellowChar">
            <div class="pupil-row" id="yellowPupils"></div>
            <div class="mouth"></div>
          </div>
        </div>

        <div class="hero-footer">
          <a href="#">Privacy Policy</a>
          <a href="#">Terms of Service</a>
          <a href="#">Contact</a>
        </div>
      </section>

      <section class="form-panel">
        <div class="form-card" id="loginCard">
          <div class="mobile-brand">
            <div class="brand-badge small">✨</div>
            <span>从容应队</span>
          </div>

          <div class="form-title">
            <h1>Welcome back!</h1>
            <p>请输入用户名和密码以登录</p>
          </div>

          <form id="loginForm" class="login-form">
            <div class="field-group">
              <label for="用户名">用户名</label>
              <input id="用户名" type="text" placeholder="请输入用户名（学号或手机号）" autocomplete="off" required />
            </div>

            <div class="field-group">
              <label for="密码">密码</label>
              <div class="password-wrapper">
                <input id="密码" type="password" placeholder="••••••••" required />
                <button type="button" id="togglePassword" aria-label="显示密码">👁️</button>
              </div>
            </div>

            <div class="sub-row">
              <label class="checkbox-row">
                <input type="checkbox" id="remember" />
                <span>记住密码</span>
              </label>
            </div>

            <div class="error-message" id="errorMessage"></div>

            <button class="btn primary" type="submit">登录</button>
          </form>

          <button class="btn outline register-btn" type="button" id="goToRegister">
            <span>立即注册</span>
          </button>
        </div>

        <div class="form-card" id="registerCard" style="display: none;">
          <div class="mobile-brand">
            <div class="brand-badge small">✨</div>
            <span>从容应队</span>
          </div>

          <div class="form-title">
            <h1>Create Account</h1>
            <p>请填写以下信息以创建账户</p>
          </div>

          <form id="registerForm" class="login-form">
            <div class="field-group">
              <label for="role">用户身份</label>
              <select id="role" required class="custom-select">
                <option value="" disabled selected>请选择身份</option>
                <option value="student">🎓 学生</option>
                <option value="teacher">📖 教师</option>
                <option value="counselor">🎧 辅导员</option>
              </select>
            </div>

            <div class="field-group" id="studentIdGroup">
              <label for="studentId">学号</label>
              <input id="studentId" type="text" placeholder="请输入学号" autocomplete="off" />
            </div>

            <div class="field-group" id="phoneGroup" style="display: none;">
              <label for="phone">手机号</label>
              <input id="phone" type="tel" placeholder="请输入手机号" autocomplete="off" />
            </div>

            <div class="field-group">
              <label for="nickname">真实姓名</label>
              <input id="nickname" type="text" placeholder="请输入真实姓名" autocomplete="off" required />
            </div>

            <div class="field-group">
              <label for="registerPassword">设置密码</label>
              <div class="password-wrapper">
                <input id="registerPassword" type="password" placeholder="请设置密码" required />
                <button type="button" id="toggleRegisterPassword" aria-label="显示密码">👁️</button>
              </div>
            </div>

            <div class="field-group">
              <label for="confirmPassword">确认密码</label>
              <input id="confirmPassword" type="password" placeholder="请再次输入密码" required />
            </div>

            <div class="error-message" id="registerError"></div>

            <button class="btn primary" type="submit">立即注册</button>
          </form>

          <button class="btn outline back-to-login-btn" type="button" id="goToLogin">
            <span>返回登录</span>
          </button>
        </div>

      </section>
    </div>

    <div class="modal" id="successModal" style="display: none;">
      <div class="modal-content">
        <div class="modal-icon">🎉</div>
        <h2>注册成功!</h2>
        <p>您的账户已创建成功，请登录</p>
        <button class="btn primary" id="modalOk">确定</button>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
