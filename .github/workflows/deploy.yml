name: Deploy to Alibaba Cloud ECS

on:
  push:
    branches: [master]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Build frontend
        run: |
          cd frontend
          npm install
          npm run build

      - name: Deploy frontend to ECS
        id: deploy-frontend
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.ECS_HOST }}
          username: root
          password: ${{ secrets.ECS_PASSWORD }}
          source: "frontend/dist/*"
          target: "/opt/sghr/frontend/"
          strip_components: 2
          rm: true

      - name: Deploy backend to ECS
        id: deploy-backend
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.ECS_HOST }}
          username: root
          password: ${{ secrets.ECS_PASSWORD }}
          script: |
            set -e
            DEPLOY_TIME=$(date +%Y%m%d_%H%M%S)
            echo "DEPLOY_TIME=$DEPLOY_TIME" >> /tmp/deploy_info

            echo "[1/6] Pulling latest code..."
            cd /root/SGHR
            git reset --hard
            git pull origin master

            echo "[2/6] Backing up existing JAR..."
            OLD_JAR=/opt/sghr/app/cryd-1.0.0.jar
            BACKUP_DIR=/opt/sghr/app/backups
            if [ -f "$OLD_JAR" ]; then
              mkdir -p "$BACKUP_DIR"
              cp "$OLD_JAR" "$BACKUP_DIR/cryd-1.0.0_${DEPLOY_TIME}.jar"
              echo "Backed up to cryd-1.0.0_${DEPLOY_TIME}.jar"

              # 只保留最近 5 个备份
              cd "$BACKUP_DIR"
              ls -t cryd-1.0.0_*.jar | tail -n +6 | xargs -r rm -f
              echo "Cleaned old backups, kept latest 5:"
              ls -la cryd-1.0.0_*.jar
            else
              echo "No existing JAR to backup (first deploy?)"
            fi

            echo "[3/6] Building backend with Docker Maven..."
            rm -rf 后端/target
            docker run --rm \
              -v /root/SGHR/后端:/app \
              -v /root/.m2:/root/.m2 \
              -w /app \
              maven:3.9-eclipse-temurin-21 \
              mvn package -DskipTests -B -q

            echo "[4/6] Deploying backend jar..."
            JAR=$(ls 后端/target/cryd-*.jar 2>/dev/null | head -1)
            if [ -z "$JAR" ]; then
              echo "ERROR: No JAR found in target/"
              exit 1
            fi
            cp -f "$JAR" /opt/sghr/app/cryd-1.0.0.jar
            echo "JAR deployed: $(stat -c %s $JAR) bytes"

            echo "[5/6] Restarting Spring Boot..."
            systemctl restart sghr
            sleep 5

            echo "[6/6] Health check..."
            for i in $(seq 1 6); do
              HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8080/ 2>/dev/null || echo "000")
              if [ "$HTTP_CODE" != "000" ]; then
                echo "Backend health check: HTTP $HTTP_CODE (attempt $i) ✓"
                break
              fi
              echo "Backend not ready yet, retrying... ($i/6)"
              sleep 5
            done

            if [ "$HTTP_CODE" = "000" ]; then
              echo "ERROR: Backend still not responding after 30s!"
              echo "=== Rolling back to previous JAR ==="
              LATEST_BACKUP=$(ls -t /opt/sghr/app/backups/cryd-1.0.0_*.jar 2>/dev/null | head -1)
              if [ -n "$LATEST_BACKUP" ]; then
                cp -f "$LATEST_BACKUP" /opt/sghr/app/cryd-1.0.0.jar
                systemctl restart sghr
                echo "Rolled back to: $LATEST_BACKUP"
              fi
              exit 1
            fi

            echo "=== Deploy complete: $DEPLOY_TIME ==="

      - name: Deployment status summary
        if: always()
        run: |
          echo "## 🚀 Deployment Status" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| 项目 | 状态 |" >> $GITHUB_STEP_SUMMARY
          echo "|------|------|" >> $GITHUB_STEP_SUMMARY

          if [ "${{ steps.deploy-frontend.outcome }}" = "success" ]; then
            echo "| 前端 | ✅ 已部署 |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| 前端 | ❌ 失败 |" >> $GITHUB_STEP_SUMMARY
          fi

          if [ "${{ steps.deploy-backend.outcome }}" = "success" ]; then
            echo "| 后端 | ✅ 已部署 |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| 后端 | ❌ 失败 (已尝试自动回滚) |" >> $GITHUB_STEP_SUMMARY
          fi

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** ${{ github.event.head_commit.message }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**By:** ${{ github.actor }} | **Branch:** ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY

      - name: Send email notification
        if: always() && secrets.MAIL_USERNAME != ''
        uses: dawidd6/action-send-mail@v4
        with:
          server_address: ${{ secrets.MAIL_SMTP_HOST || 'smtp.qq.com' }}
          server_port: ${{ secrets.MAIL_SMTP_PORT || 587 }}
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: ${{ job.status == 'success' && '✅' || '❌' }} CRYD 部署${{ job.status == 'success' && '成功' || '失败' }} - ${{ github.event.head_commit.message }}
          to: ${{ secrets.MAIL_TO }}
          from: ${{ secrets.MAIL_USERNAME }}
          body: |
            <h2>${{ job.status == 'success' && '✅ 部署成功' || '❌ 部署失败' }}</h2>
            <table border="0" cellpadding="4">
              <tr><td><b>仓库</b></td><td>${{ github.repository }}</td></tr>
              <tr><td><b>提交</b></td><td>${{ github.event.head_commit.message }}</td></tr>
              <tr><td><b>操作人</b></td><td>${{ github.actor }}</td></tr>
              <tr><td><b>分支</b></td><td>master</td></tr>
            </table>
            <br>
            <a href="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}">🔗 查看详情</a>
            <br><br>
            <small>🤖 CRYD 智能体协同学习平台 · 自动部署</small>
