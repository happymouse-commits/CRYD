name: CRYD CI/CD — Build & Deploy

on:
  push:
    branches: [master]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          java-version: 21
          distribution: temurin
          cache: maven

      - name: Build with Maven
        run: |
          cd 后端
          mvn package -DskipTests -B -q
          ls -lh target/*.jar

      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: cryd-jar
          path: 后端/target/*.jar

      - name: Deploy to ECS
        run: |
          # Set up SSH
          mkdir -p ~/.ssh
          echo "${{ secrets.ECS_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

          # Stop service
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no ${{ secrets.ECS_USER }}@${{ secrets.ECS_HOST }} \
            "systemctl stop cryd-v2 || true; cp /opt/cryd-v2/app/cryd-1.0.0.jar /opt/cryd-v2/app/cryd-1.0.0.jar.bak 2>/dev/null || true"

          # Upload JAR
          scp -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no \
            后端/target/cryd-1.0.0.jar \
            ${{ secrets.ECS_USER }}@${{ secrets.ECS_HOST }}:/opt/cryd-v2/app/cryd-1.0.0.jar

          # Start and verify
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no ${{ secrets.ECS_USER }}@${{ secrets.ECS_HOST }} << 'REMOTE'
            systemctl start cryd-v2
            sleep 10
            if systemctl is-active --quiet cryd-v2; then
              echo "✅ CRYD v2 deployed"
              curl -s -o /dev/null -w "HTTP: %{http_code}\n" http://localhost:8081/
            else
              echo "❌ Start failed"
              journalctl -u cryd-v2 -n 20 --no-pager
              exit 1
            fi
          REMOTE
