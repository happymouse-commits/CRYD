name: Deploy to Alibaba Cloud ECS

on:
  push:
    branches: [master]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Build frontend
        run: |
          cd frontend
          npm install
          npm run build

      - name: Trigger ECS deploy
        env:
          ECS_HOST: ${{ secrets.ECS_HOST }}
          ECS_PASSWORD: ${{ secrets.ECS_PASSWORD }}
        run: |
          echo "GitHub runner cannot reach Alibaba Cloud ECS directly."
          echo "ECS-side cron job handles auto-deploy."
          exit 0