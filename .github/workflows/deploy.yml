name: Deploy to Alibaba Cloud ECS

on:
  push:
    branches: [master]

jobs:
  build-and-notify:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Build frontend
        run: |
          cd frontend
          npm install
          npm run build

      # ---- 邮件通知（ECS cron 会自动拉取部署） ----
      - name: Check email config
        id: mail-check
        if: always()
        run: |
          if [ -n "${{ secrets.MAIL_USERNAME }}" ]; then
            echo "enabled=true" >> $GITHUB_OUTPUT
          else
            echo "enabled=false" >> $GITHUB_OUTPUT
            echo "Email notification skipped (MAIL_USERNAME not set)"
          fi

      - name: Send email notification
        if: always() && steps.mail-check.outputs.enabled == 'true'
        uses: dawidd6/action-send-mail@v4
        with:
          server_address: smtp.qq.com
          server_port: 587
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: 📦 CRYD 代码已推送 - ${{ github.event.head_commit.message }}
          to: ${{ secrets.MAIL_TO }}
          from: ${{ secrets.MAIL_USERNAME }}
          body: |
            <h2>📦 代码已推送到 master</h2>
            <p>ECS 服务器将定时拉取并自动部署。</p>
            <table border="0" cellpadding="4">
              <tr><td><b>仓库</b></td><td>${{ github.repository }}</td></tr>
              <tr><td><b>提交</b></td><td>${{ github.event.head_commit.message }}</td></tr>
              <tr><td><b>操作人</b></td><td>${{ github.actor }}</td></tr>
              <tr><td><b>分支</b></td><td>master</td></tr>
            </table>
            <br>
            <a href="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}">🔗 查看构建详情</a>
            <br><br>
            <small>🤖 CRYD 智能体协同学习平台 · 自动部署</small>
