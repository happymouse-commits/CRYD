server {
    listen 8081;
    server_name _;

    # index.html - no cache (always get latest)
    location = /index.html {
        root /opt/sghr-v2/frontend;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }

    # Static assets - long cache (filename has hash)
    location /assets/ {
        root /opt/sghr-v2/frontend;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Backend static pages (fallback to Spring Boot)
    location = /login.html {
        proxy_pass http://127.0.0.1:8081/login.html;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
    location = /script.js {
        proxy_pass http://127.0.0.1:8081/script.js;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
    location = /styles.css {
        proxy_pass http://127.0.0.1:8081/styles.css;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Other static files (Vue SPA)
    location / {
        root /opt/sghr-v2/frontend;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # API proxy
    location /api/ {
        proxy_pass http://127.0.0.1:8081/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }

    # WebSocket
    location /ws/ {
        proxy_pass http://127.0.0.1:8081/ws/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
